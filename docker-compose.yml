version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  #image: apache/airflow:2.9.2-python3.11
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    #- _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-apache-spark pyspark==3.5.0
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./airflow_output:/opt/airflow/airflow_output
    - ./spark_jobs:/opt/airflow/spark_jobs
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - AIRFLOW__WEBSERVER__SECRET_KEY=super_secret_flask_key_123456789
    depends_on:
      - postgres

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123" 
      - "9000:9000"
    environment:
      - CLICKHOUSE_PASSWORD=clickhouse_pass   
     
    volumes:
      - ./clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql
      - clickhouse-data:/var/lib/clickhouse 


  spark-master:
    image: bitnamilegacy/spark:3.5.1
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080" 
      - "7077:7077" 
    volumes:
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./airflow_output:/opt/airflow/airflow_output

  spark-worker-1:
    image: bitnamilegacy/spark:3.5.1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./airflow_output:/opt/airflow/airflow_output

  spark-worker-2:
    image: bitnamilegacy/spark:3.5.1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./airflow_output:/opt/airflow/airflow_output

  spark-worker-3:
    image: bitnamilegacy/spark:3.5.1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./airflow_output:/opt/airflow/airflow_output

volumes:
  postgres-data:
  clickhouse-data: